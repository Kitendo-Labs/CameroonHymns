name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cameroonhymns
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 65002 "${{ secrets.HOSTINGER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      # This is a static HTML site with no build step, so the repo files are
      # rsynced straight into the cameroonhymns subdomain folder.
      # --delete clears stale files, but every anchored --exclude is immune to
      # deletion (no --delete-excluded): repo metadata stays out of the web root
      # and any live server-side .htaccess / Let's Encrypt challenge is preserved.
      - name: Deploy via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -p 65002 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='/.git/' \
            --exclude='/.github/' \
            --exclude='/.gitignore' \
            --exclude='/README.md' \
            --exclude='/.htaccess' \
            --exclude='/.well-known/' \
            --exclude='.DS_Store' \
            ./ \
            "${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:domains/kitendo.net/public_html/cameroonhymns/"

      - name: Remove deploy key
        if: always()
        run: rm -f ~/.ssh/deploy_key
